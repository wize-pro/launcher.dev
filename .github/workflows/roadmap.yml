name: Roadmap

on:
  issues:
    types: [opened, edited, closed, reopened, deleted, labeled, unlabeled, milestoned, demilestoned]
  milestone:
    types: [created, edited, deleted, opened, closed]
  workflow_dispatch:

permissions:
  contents: write
  issues: read

concurrency:
  group: roadmap
  cancel-in-progress: false

jobs:
  update-roadmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Update ROADMAP.md (race-safe)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            # Always regenerate from the latest main so concurrent runs converge.
            git fetch --quiet origin main
            git reset --hard --quiet origin/main
            node scripts/gen-roadmap.mjs
            if git diff --quiet -- ROADMAP.md; then
              echo "ROADMAP.md already up to date."
              exit 0
            fi
            git add ROADMAP.md
            git commit -m "docs: auto-update ROADMAP.md [skip ci]"
            if git push origin HEAD:main; then
              echo "Pushed ROADMAP.md update."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — re-syncing and retrying."
          done
          echo "Failed to update ROADMAP.md after retries." >&2
          exit 1
