# ─────────────────────────────────────────────────────────────
# Example .launcher.yml
# Copy this file to the root of your project, rename it .launcher.yml,
# and adapt the commands to your needs.
# ─────────────────────────────────────────────────────────────

name: "My Project"
description: "A short optional description"

# Free-form tags — used as filters in the UI
tags: [backend, dotnet, work]

# Sidebar accent color for the project card (optional)
# Suggested colors:
#   #6366f1 violet (default)  |  #22c55e green  |  #f59e0b yellow
#   #3b82f6 blue              |  #ef4444 red    |  #ec4899 pink
color: "#6366f1"

# Available commands (free keys — add as many as you need)
commands:

  # ── .NET ──────────────────────────────────────────────────
  dev:
    label: "Local dev"
    cmd: "dotnet run"
    cwd: "./src/MyApi"    # path relative to the project root
    port: 5000             # optional — shows a clickable link to localhost:PORT

  watch:
    label: "Dev (watch)"
    cmd: "dotnet watch run"
    cwd: "./src/MyApi"
    port: 5000

  # ── Docker ────────────────────────────────────────────────
  docker:
    label: "Docker Compose"
    cmd: "docker-compose up"
    # no cwd = project root
    port: 8080

  docker-build:
    label: "Docker Compose (rebuild)"
    cmd: "docker-compose up --build"
    port: 8080

  # ── Node / Frontend ───────────────────────────────────────
  # dev:
  #   label: "Dev (Vite)"
  #   cmd: "npm run dev"
  #   port: 5173

  # build:
  #   label: "Build"
  #   cmd: "npm run build"

